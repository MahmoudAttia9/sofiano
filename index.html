<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <!-- Mobile-optimized viewport -->
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Sofiano Coffee Menu - قائمة مقهى سوفيانو الإسكندرية - أجواء العيد">
    <meta name="theme-color" content="#0F2B2B">

    <!-- Mobile Web App Capable -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sofiano Eid">

    <meta name="format-detection" content="telephone=no">

    <!-- Resource Hints (Preload Critical Assets) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- Fonts & Icons -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Fonts CSS -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap">

    <title>Sofiano Menu - Eid Vibes | قائمة سوفيانو</title>

    <style>
        /* ========================================
           ROOT VARIABLES & PERFORMANCE OPTIMIZATION
        ======================================== */
        :root {
            --navy-teal: #0F2B2B;
            --dark-teal: #15403F;
            --gold: #D4AF37;
            --gold-glow: #F9E5B0;
            --beige-cream: #F5E6D3;
            --eid-peach: #F6C183;
            --eid-mint: #CFEFE0;
            --white: #FFFFFF;
            --text-dark: #1B4D4D;
        }

        /* Hardware Acceleration Class */
        .gpu-accelerated {
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background: linear-gradient(180deg, #fffaf2 0%, #fff6e8 45%, #fef3df 100%);
            background-image: radial-gradient(rgba(212, 175, 55, 0.22) 0.7px, transparent 0.7px), radial-gradient(rgba(21, 64, 63, 0.12) 0.7px, #fff9f0 0.7px);
            background-size: 22px 22px;
            background-position: 0 0, 10px 10px;
            background-attachment: fixed;
            /* Parallax feel */
            color: var(--text-dark);
            overflow-x: hidden;
            min-height: 100vh;
            /* Performance: Improve text rendering */
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        /* ========================================
           HEADER SECTION (OPTIMIZED ANIMATIONS)
        ======================================== */
        .header-section {
            background: radial-gradient(circle at center bottom, #1f5e5d 0%, #0F2B2B 58%, #041616 100%);
            padding: 80px 20px 80px;
            /* Extra padding bottom for wave */
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            contain: content;
            /* Browser optimization: don't paint outside */
        }

        /* Twinkling Stars Background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.3;
                transform: translateY(0);
            }

            100% {
                opacity: 0.5;
                transform: translateY(-10px);
            }
        }

        /* Shape Divider (Wave/Islamic Arch) at Bottom */
        .custom-shape-divider-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
            transform: rotate(180deg);
        }

        .custom-shape-divider-bottom svg {
            position: relative;
            display: block;
            width: calc(130% + 1.3px);
            height: 50px;
            transform: rotateY(180deg);
        }

        .custom-shape-divider-bottom .shape-fill {
            fill: #FFF9F0;
            /* Matches body background */
        }

        /* HANGING DECORATIONS */
        .ramadan-decorations {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .hanging-item {
            position: absolute;
            transform-origin: top center;
            will-change: transform;
            /* Hint to browser */
        }

        .string {
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            background: rgba(212, 175, 55, 0.6);
            transform: translateX(-50%);
        }

        /* Optimized Animation Classes */
        .swing-slow {
            animation: swing 4s infinite ease-in-out alternate;
        }

        .swing-med {
            animation: swing 3.5s infinite ease-in-out alternate-reverse;
        }

        .swing-fast {
            animation: swing 3s infinite ease-in-out alternate;
        }

        .decor-1 {
            left: 10%;
            height: 140px;
        }

        .decor-2 {
            left: 25%;
            height: 90px;
        }

        .decor-3 {
            left: 85%;
            height: 160px;
        }

        .decor-4 {
            left: 70%;
            height: 100px;
        }

        .hanging-item i {
            color: var(--gold);
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
            position: absolute;
            bottom: -20px;
            /* Adjust based on icon size */
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
        }

        .decor-2 i,
        .decor-4 i {
            font-size: 1.2rem;
            color: var(--gold-glow);
            bottom: -12px;
        }

        @keyframes swing {
            0% {
                transform: rotate(3deg);
            }

            100% {
                transform: rotate(-3deg);
            }
        }

        @keyframes float-balloon {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
            100% { transform: translateY(0) rotate(-2deg); }
        }

        /* LOGO STYLES */
        .logo-container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 0 auto;
            transform: translateZ(0);
            /* Force GPU layer */
        }

        .logo-image {
            width: 280px;
            height: auto;
            /* Maintain aspect ratio */
            display: block;
            margin: 0 auto 10px;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.3));
            animation: floatLogo 6s ease-in-out infinite;
        }

        @keyframes floatLogo {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .logo-text {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            margin: 0;
            line-height: 1;
        }

        .ramadan-badge {
            background: linear-gradient(120deg, rgba(212, 175, 55, 0.2), rgba(246, 193, 131, 0.25));
            border: 1px solid var(--gold);
            color: var(--white);
            padding: 5px 20px;
            border-radius: 20px;
            font-family: 'Reem Kufi', sans-serif;
            display: inline-block;
            margin-top: 10px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        /* Added English Text Style */
        .ramadan-text-en {
            font-family: 'Reem Kufi', sans-serif;
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 5px;
            margin-top: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            font-weight: 600;
        }

        /* ========================================
           NAV & MENU (PERFORMANCE OPTIMIZED)
        ======================================== */
        .category-nav {
            padding: 15px 0;
            position: sticky;
            top: 0;
            background: linear-gradient(90deg, rgba(255, 249, 240, 0.94), rgba(246, 193, 131, 0.08), rgba(207, 239, 224, 0.34));
            /* High contrast background */
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0 8px 20px rgba(15, 43, 43, 0.08);
            border-top: 1px solid rgba(212, 175, 55, 0.25);
            border-bottom: 1px solid rgba(212, 175, 55, 0.25);
        }

        .category-head {
            max-width: 980px;
            margin: 0 auto 10px;
            padding: 0 15px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
        }

        .category-head h3 {
            font-family: 'Reem Kufi', sans-serif;
            color: var(--dark-teal);
            font-size: 1.1rem;
            letter-spacing: 0.3px;
        }

        .category-head span {
            font-size: 0.76rem;
            color: #5e7f7e;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
        }

        .category-pills {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 15px 2px;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
            max-width: 980px;
            margin: 0 auto;
        }

        .category-pills::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            padding: 10px 12px;
            border: 1px solid rgba(15, 43, 43, 0.45);
            background: rgba(255, 255, 255, 0.76);
            color: var(--navy-teal);
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s, border-color 0.2s;
            box-shadow: 0 2px 8px rgba(15, 43, 43, 0.08);
            min-width: 140px;
            scroll-snap-align: center;
            text-align: right;
        }

        .category-btn .icon-badge {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.22), rgba(255, 255, 255, 0.9));
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #815f1e;
        }

        .category-btn .labels {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.1;
        }

        .category-btn .label-ar {
            font-size: 0.86rem;
            font-weight: 800;
            color: #143b3a;
        }

        .category-btn .label-en {
            font-size: 0.66rem;
            opacity: 0.75;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .category-btn.active {
            background: linear-gradient(120deg, #0f2b2b, #1b4d4d);
            color: var(--gold-glow);
            border-color: var(--navy-teal);
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(15, 43, 43, 0.22);
        }

        .category-btn.active .icon-badge {
            background: linear-gradient(135deg, rgba(249, 229, 176, 0.95), rgba(212, 175, 55, 0.88));
            color: #0f2b2b;
            border-color: rgba(249, 229, 176, 0.75);
        }

        .category-btn.active .label-ar,
        .category-btn.active .label-en {
            color: var(--gold-glow);
        }

        .category-btn:hover {
            transform: translateY(-1px);
            border-color: var(--gold);
        }

        /* Content Visibility: The magic property for performance */
        .menu-category {
            content-visibility: auto;
            /* Skips rendering off-screen content */
            contain-intrinsic-size: 1000px;
            /* Estimated height to prevent scroll jump */
            margin-bottom: 40px;
        }

        .menu-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .menu-intro {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.12), rgba(255, 255, 255, 0.85), rgba(207, 239, 224, 0.48));
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            padding: 14px 18px;
            margin: 8px 0 22px;
            text-align: center;
            box-shadow: 0 10px 24px rgba(15, 43, 43, 0.07);
        }

        .menu-intro h2 {
            font-family: 'Reem Kufi', sans-serif;
            color: var(--dark-teal);
            margin-bottom: 6px;
            font-size: 1.2rem;
        }

        .menu-intro p {
            color: #265a59;
            font-size: 0.92rem;
        }

        .category-title {
            text-align: center;
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2rem;
            color: var(--navy-teal);
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
            width: 100%;
        }

        /* Decorative Sides for Title */
        .category-title::before,
        .category-title::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 2px;
            background: var(--gold);
            vertical-align: middle;
            margin: 0 10px;
        }

        .menu-table-container {
            /* Removed old table style, replaced with Grid */
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 5px;
        }

        @media (min-width: 768px) {
            .menu-table-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .menu-item {
            background: #fff;
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.15);
        }

        .menu-item:hover::before {
            opacity: 1;
        }

        .item-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 5px;
        }

        .item-names {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .item-name-ar {
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            color: var(--navy-teal);
            font-size: 1.15rem;
            line-height: 1.2;
        }

        .item-name-en {
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .item-dots {
            flex-grow: 1;
            border-bottom: 2px dotted rgba(212, 175, 55, 0.3);
            margin: 0 15px 6px 15px;
            min-width: 30px;
        }

        .item-prices {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .price-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fffafa;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 4px 10px;
            min-width: 55px;
        }

        .price-badge span.size {
            font-family: 'Poppins', sans-serif;
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .price-badge span.amount {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: #C59D5F;
            font-size: 1.05rem;
            line-height: 1;
        }

        .item-description {
            font-size: 0.8rem;
            color: #666;
            margin-top: 8px;
            background: #fdfbf7;
            padding: 8px 12px;
            border-radius: 6px;
            border-right: 2px solid var(--gold);
        }

        /* Hide old headers & classes */
        .menu-header {
            display: none;
        }

        /* ========================================
           OFFERS GALLERY (NEW)
        ======================================== */
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* 2 columns on mobile */
            gap: 15px;
            padding: 10px 0;
        }

        @media (min-width: 768px) {
            .offers-grid {
                grid-template-columns: repeat(3, 1fr);
                /* 3 columns on tablet */
                gap: 20px;
            }
        }

        @media (min-width: 1024px) {
            .offers-grid {
                grid-template-columns: repeat(4, 1fr);
                /* 4 columns on desktop */
            }
        }

        .offer-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.3);
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            aspect-ratio: 4/3;
            /* Match 800x600 image ratio */
        }

        .offer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.25);
            border-color: var(--gold);
        }

        .offer-card::after {
            content: '\f00e';
            /* Zoom icon FontAwesome */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: var(--white);
            font-size: 2rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .offer-card:hover::after {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .offer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 43, 43, 0.4);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
        }

        .offer-card:hover::before {
            opacity: 1;
        }

        .offer-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Lightbox Modal */
        .lightbox-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 43, 43, 0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .lightbox-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 2px solid var(--gold);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: contain;
        }

        .lightbox-modal.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--white);
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 2001;
            transition: color 0.3s;
        }

        .lightbox-close:hover {
            color: var(--gold);
        }

        /* ========================================
           SCROLL TO TOP BUTTON
        ======================================== */
        .scroll-top-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--navy-teal);
            color: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--gold);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 900;
            font-size: 1.2rem;
        }

        .scroll-top-btn.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .scroll-top-btn:hover {
            transform: translateY(-5px);
            background: var(--gold);
            color: var(--navy-teal);
        }

        /* ========================================
           FOOTER
        ======================================== */
        .footer-section {
            background: var(--navy-teal);
            color: var(--white);
            padding: 40px 20px 80px;
            /* Extra padding for mobile scroll */
            text-align: center;
            margin-top: 40px;
            border-top: 4px solid var(--gold);
            position: relative;
            overflow: hidden;
        }

        .footer-section::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(246, 193, 131, 0.2), transparent 70%);
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: var(--gold);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 8px;
            text-decoration: none;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* ========================================
           RESPONSIVE TWEAKS
        ======================================== */
        @media (max-width: 768px) {
            .logo-text {
                font-size: 2.8rem;
            }

            .header-section {
                min-height: 350px;

        };

        // CORE VARS
        let currentCategory = 'all';

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            renderCategoryButtons();
            renderMenuContent();
            setupScrollTop();

            // Set first button active
            const firstBtn = document.querySelector('.category-btn');
            if (firstBtn) firstBtn.classList.add('active');
        });

        function renderCategoryButtons() {
            const container = document.getElementById('categoryPills');
            const fragment = document.createDocumentFragment();

            menuData.categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.dataset.id = category.id;
                btn.innerHTML = `
                    <span class="icon-badge"><i class="fa-solid ${category.icon}"></i></span>
                    <span class="labels">
                        <span class="label-ar">${category.name_ar}</span>
                        <span class="label-en">${category.name}</span>
                    </span>
                `;
                btn.addEventListener('click', () => switchCategory(category.id, btn));
                fragment.appendChild(btn);
            });

            container.innerHTML = '';
            container.appendChild(fragment);
        }

        function switchCategory(id, btn) {
            currentCategory = id;

            // Update UI
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            centerActiveCategory(btn);

            // Optimized render
            renderMenuContent();

            // UX FIX: Scroll to menu content smoothly if user scrolled past the tabs
            const menuContainer = document.querySelector('.menu-container');
            if (window.scrollY > menuContainer.offsetTop - 50) {
                window.scrollTo({ top: menuContainer.offsetTop - 80, behavior: 'smooth' });
            }
        }

        function centerActiveCategory(btn) {
            if (!btn) return;
            btn.scrollIntoView({
                behavior: 'smooth',
                inline: 'center',
                block: 'nearest'
            });
        }

        function renderMenuContent() {
            const container = document.getElementById('menuContent');

            // Using a simple loading placeholder prevents jank
            container.innerHTML = '<div style="height:200px"></div>';

            // requestAnimationFrame pushes the heavy DOM work to next frame to allow button tap feedback
            requestAnimationFrame(() => {
                let html = '';

                // Determine what to show
                const catsToShow = currentCategory === 'all'
                    ? menuData.categories.filter(c => c.id !== 'all')
                    : menuData.categories.filter(c => c.id === currentCategory);

                catsToShow.forEach(cat => {
                    const items = menuData.items[cat.id];
                    if (!items) return;

                    // CHECK IF OFFERS CATEGORY TO RENDER GRID
                    if (cat.id === 'offers') {
                        let offersHtml = items.map(item => `
                            <div class="offer-card" onclick="openLightbox('${item.src}')">
                                <img src="${item.src}" class="offer-image" alt="${item.alt}" loading="lazy" onerror="this.src='https://placehold.co/600x600/0F2B2B/D4AF37?text=Eid+Offer'">
                            </div>
                        `).join('');

                        html += `
                            <div class="menu-category" id="${cat.id}">
                                <h2 class="category-title">${cat.name_ar}</h2>
                                <div class="offers-grid">
                                    ${offersHtml}
                                </div>
                            </div>
                        `;
                    } else {
                        // NORMAL MENU ITEMS LIST
                        let itemsHtml = items.map(item => {
                            const priceS = item.price_s !== null ? `<div class="price-badge"><span class="size">S</span><span class="amount">${item.price_s}</span></div>` : '';
                            const priceD = item.price_d !== null ? `<div class="price-badge"><span class="size">D</span><span class="amount">${item.price_d}</span></div>` : '';

                            return `
                                <div class="menu-item">
                                    <div class="item-row">
                                        <div class="item-names">
                                            <div class="item-name-ar">${item.name_ar}</div>
                                            <div class="item-name-en">${item.name_en}</div>
                                        </div>
                                        <div class="item-dots"></div>
                                        <div class="item-prices">
                                            ${priceS}
                                            ${priceD}
                                        </div>
                                    </div>
                                    ${item.description ? `<div class="item-description">${item.description}</div>` : ''}
                                </div>
                            `;
                        }).join('');

                        // Note logic
                        const note = cat.id === 'special-coffee'
                            ? `<div style="grid-column: 1 / -1; padding:15px; background:rgba(212,175,55,0.05); font-size:0.85rem; text-align:center; color:var(--dark-teal); border:1px dashed #D4AF37; border-radius:12px; margin-top: 10px;">
                                <i class="fas fa-star" style="color:var(--gold)"></i> 
                                النكهات: فانيلا – بندق – فستق – شوكولاتة – كراميل – مانجو – توت – تفاح – فراولة
                            </div>`
                            : '';

                        html += `
                            <div class="menu-category" id="${cat.id}">
                                <h2 class="category-title">${cat.name_ar}</h2>
                                <div class="menu-table-container">
                                    ${itemsHtml}
                                    ${note}
                                </div>
                            </div>
                        `;
                    }
                });

                container.innerHTML = html || '<div style="text-align:center; padding:40px;">لا توجد عناصر</div>';

                // Show English names on desktop only via simple CSS logic injection (optional but cleaner)
                if (window.innerWidth > 768) {
                    document.querySelectorAll('.desktop-only').forEach(el => el.style.display = 'block');
                    document.querySelectorAll('.mobile-only').forEach(el => el.style.display = 'none');
                }
            });
        }

        // Scroll Top Logic
        function setupScrollTop() {
            const btn = document.getElementById('scrollTopBtn');

            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            }, { passive: true });

            btn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // LIGHTBOX FUNCTIONS
        function openLightbox(src) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('lightboxImg');

            // Check for placeholder logic if real src fails (simplified for now)
            img.src = src;

            // Handle error inside lightbox too just in case
            img.onerror = function () {
                this.src = 'https://placehold.co/600x600/0F2B2B/D4AF37?text=Eid+Offer';
            };

            // Add escape key listener
            document.addEventListener('keydown', handleEscapeKey);

            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scrolling bg
        }

        function handleEscapeKey(e) {
            if (e.key === 'Escape') closeLightbox();
        }

        function closeLightbox(event) {
            // Prevent bubbling if clicking on the image itself
            if(event && event.target.tagName === 'IMG') return;
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
            document.removeEventListener('keydown', handleEscapeKey);
        }

    </script>
